{% extends 'movies/base.html' %}

{% block content %}
<div class="card movie-card">
	<div class="row g-0">
		<div class="col-12 col-md-4">
			{% if movie.poster_url %}
			<img src="{{ movie.poster_url }}" class="img-fluid rounded-start" alt="Poster de {{ movie.title }}" style="height: 100%; object-fit: cover;">
			{% else %}
			<div class="poster-placeholder" style="min-height: 280px;">
				Sin imagen
			</div>
			{% endif %}
		</div>
		<div class="col-12 col-md-8">
			<div class="card-body">
				<h2 class="card-title mb-3">{{ movie.title }}</h2>
				<p class="mb-2"><strong>Año de publicación:</strong> {{ movie.publication_year }}</p>
				<p class="mb-2"><strong>Director:</strong> {{ movie.director }}</p>
				<p class="mb-2"><strong>Género:</strong> {{ movie.genre }}</p>
				<p class="mt-3">{{ movie.synopsis }}</p>
				<a href="{% url 'index' %}" class="btn btn-brand btn-sm mt-2">Regresar al listado</a>
			</div>
		</div>
	</div>
</div>
{% endblock %}
