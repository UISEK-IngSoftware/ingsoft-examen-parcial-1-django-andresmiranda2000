<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCKBUSTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue-dark: #061b4d;
            --brand-blue: #123a96;
            --brand-blue-soft: #1d4fb8;
            --brand-yellow: #f6c343;
            --text-light: #f8f9fa;
        }

        body {
            background: linear-gradient(180deg, #0a1f57 0%, #102f79 100%);
            min-height: 100vh;
        }

        .app-shell {
            max-width: 920px;
        }

        .app-header {
            background-color: var(--brand-blue);
            border: 2px solid var(--brand-yellow);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .app-title {
            color: var(--brand-yellow);
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .app-subtitle {
            color: var(--text-light);
            opacity: 0.9;
        }

        .movie-card {
            border: 1px solid var(--brand-yellow);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
        }

        .movie-card .card-body,
        .movie-card .card-footer {
            background-color: #ffffff;
        }

        .btn-brand {
            background-color: var(--brand-yellow);
            border: none;
            color: #1e1e1e;
            font-weight: 600;
        }

        .btn-brand:hover {
            background-color: #ffd66f;
            color: #1e1e1e;
        }

        .poster-placeholder {
            background-color: #e9ecef;
            color: #495057;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>


<body>
    <div class="container py-4">
        <div class="app-shell mx-auto">
            <div class="app-header p-4 mb-4 rounded">
                <h1 class="app-title h3 mb-1">BLOCKBUSTER</h1>
            </div>

            {% block content %}
            {% endblock %}
        </div>
    </div>
</body>


</html>
